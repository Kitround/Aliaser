<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aliaser</title>
<link rel="stylesheet" href="css/style.css" blocking="render">
<style>
/* Critical CSS variables duplicated here to prevent FOUC before style.css loads */
:root{
  --bg:#0f0f0f;--bg2:#0f0f0f;--surface:#171717;--surface2:#1e1e1e;--surface3:#242424;
  --border:#2a2a2a;--border2:#333;--text:#e0e0e0;--text-muted:#808080;--text-dim:#515151;
  --accent:#5b54e8;--accent-soft:rgba(91,84,232,.12);--accent-hover:#6b65f0;
  --red:#e05050;--red-soft:rgba(224,80,80,.1);--green:#0098ff;--green-soft:rgba(0,152,255,.08);
  --orange:#e09040;--sl:#c026a0;--sl-soft:rgba(192,38,160,.12);
  --addy:#0ea5e9;--addy-soft:rgba(14,165,233,.12);--cf:#f97316;--cf-soft:rgba(249,115,22,.12);
  --mono:'SF Mono','Fira Mono','Fira Code',monospace;--t:.15s;
}
*{box-sizing:border-box}
html,body{width:420px;height:580px;overflow:hidden;display:flex;flex-direction:column;background:var(--bg);color:var(--text)}

/* ── Fixed top ── */
.p-top{flex-shrink:0}

/* Header */
.p-header{display:flex;align-items:center;gap:8px;padding:0 14px;height:46px;border-bottom:1px solid var(--border)}
.p-header .brand{display:flex;align-items:center;gap:8px;flex:1}
.p-header .brand-name{font-size:.85rem;font-weight:600;color:var(--text)}
.p-dashboard{display:flex;align-items:center;gap:5px;background:none;border:none;color:var(--text-muted);font-size:.72rem;cursor:pointer;padding:4px 6px;border-radius:6px;transition:color .15s;font-family:inherit;white-space:nowrap}
.p-dashboard:hover{color:var(--text)}
.p-dashboard svg{opacity:.7}

/* Create */
.p-create{padding:12px 14px 10px}

.p-pills-label{font-size:.6rem;font-family:var(--mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.p-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.p-pill{font-size:.68rem;font-family:var(--mono);padding:4px 10px;border-radius:50px;border:1px solid var(--border2);color:var(--text-muted);background:transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
.p-pill:hover{border-color:var(--accent);color:var(--text)}
.p-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}

.p-field-label{font-size:.6rem;font-family:var(--mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.p-name-row{display:flex;gap:6px;align-items:center}
.p-name-row .p-input{flex:1}
.p-rand-btn{flex-shrink:0;width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text-muted);cursor:pointer;transition:color .15s,border-color .15s,background .15s}
.p-rand-btn:hover{color:var(--text);border-color:var(--accent);background:var(--accent-soft)}
.p-input{width:100%;height:34px;padding:0 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;font-family:var(--mono);font-size:.82rem;color:var(--text);outline:none;transition:border-color .15s}
.p-input:focus{border-color:var(--accent)}
.p-input::placeholder{color:var(--text-dim)}

/* SL suffix chips */
.p-suffix-wrap{margin-top:7px;display:none}
.p-suffix-label{font-size:.6rem;font-family:var(--mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.p-suffix-chips{display:flex;flex-wrap:wrap;gap:4px}
.p-suffix-chip{font-size:.65rem;font-family:var(--mono);padding:3px 8px;border-radius:50px;border:1px solid var(--border2);color:var(--text-dim);background:transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
.p-suffix-chip:hover{border-color:var(--sl);color:var(--sl)}
.p-suffix-chip.active{border-color:var(--sl);color:var(--sl);background:var(--sl-soft)}

/* Preview */
.p-preview{margin-top:7px;font-family:var(--mono);font-size:.8rem;font-weight:500;color:#fff;background:var(--accent);border:1px solid var(--accent);border-radius:20px;padding:5px 12px;display:flex;align-items:center;min-height:0;cursor:default;overflow:hidden;white-space:nowrap;transition:all var(--t)}
.p-preview.p-preview-ph{color:var(--text-dim);background:var(--surface2);border-color:var(--border)}
.p-preview span{display:block;overflow:hidden;white-space:nowrap}
.p-preview.preview-overflow span{-webkit-mask-image:linear-gradient(to right,#000 calc(100% - 28px),transparent 100%);mask-image:linear-gradient(to right,#000 calc(100% - 28px),transparent 100%)}
.p-preview:empty{display:none}

/* Create button */
.p-create-btn{margin-top:10px;width:100%;height:36px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.8rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s}
.p-create-btn:hover:not(:disabled){background:var(--accent-hover)}
.p-create-btn:disabled{opacity:.4;cursor:default}

/* Search */
.p-search-wrap{padding:8px 14px;position:relative}
.p-search-icon{position:absolute;left:23px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none}
.p-search{width:100%;height:30px;padding:0 10px 0 28px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;font-size:.78rem;font-family:var(--mono);color:var(--text);outline:none;transition:border-color .15s}
.p-search:focus{border-color:var(--accent)}
.p-search::placeholder{color:var(--text-dim)}

/* ── Scrollable list ── */
.p-list{flex:1;overflow-y:auto;min-height:0}
.p-item{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border)}
.p-item.is-disabled{opacity:.45}
.p-item-addr{flex:1;min-width:0}
.p-item-local{font-size:.8rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;mask-image:linear-gradient(to right,#000 80%,transparent 100%)}
.p-item-domain{color:var(--text-dim);font-weight:400}
.p-item-note{font-size:.67rem;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:5px}
.p-actions{display:flex;gap:4px;flex-shrink:0}
.p-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text-muted);cursor:pointer;border-radius:8px;transition:color .15s,background .15s}
.p-btn:hover{color:var(--text);background:var(--surface3)}
.p-btn.sl-on,.p-btn.toggle-on{color:var(--accent)}
.p-btn.sl-on:hover,.p-btn.toggle-on:hover{color:var(--accent-hover);background:var(--accent-soft)}
.p-btn.danger:hover{color:var(--red);background:var(--red-soft)}

/* ── Contacts panel ── */
.contacts-panel{display:none;position:fixed;inset:0;background:var(--bg);z-index:90;flex-direction:column}
.contacts-panel.open{display:flex}
.contacts-header{display:flex;align-items:center;gap:8px;padding:0 14px;height:46px;border-bottom:1px solid var(--border);flex-shrink:0}
.contacts-title{flex:1;min-width:0}
.contacts-label{font-size:.75rem;font-family:var(--mono);color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.contacts-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text-muted);cursor:pointer;border-radius:6px;flex-shrink:0}
.contacts-close:hover{color:var(--text);background:var(--surface3)}
.contacts-list{flex:1;overflow-y:auto;min-height:0}
.contacts-state{display:flex;align-items:center;justify-content:center;padding:28px;color:var(--text-dim);font-size:.78rem;text-align:center;line-height:1.5}
.contact-item{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border)}
.contact-item.is-blocked{opacity:.45}
.contact-info{flex:1;min-width:0}
.contact-email{font-size:.78rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.contact-reverse{font-size:.67rem;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.contact-actions{display:flex;gap:3px;flex-shrink:0}
.contact-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text-muted);cursor:pointer;border-radius:6px;transition:color .15s,background .15s}
.contact-btn:hover{color:var(--text);background:var(--surface3)}
.contact-btn.is-blocked-btn{color:var(--red)}
.contact-btn.is-blocked-btn:hover{background:var(--red-soft)}
.contact-btn.block-btn:not(.is-blocked-btn):hover{color:var(--red);background:var(--red-soft)}
.contacts-footer{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);flex-shrink:0}
.contacts-add-btn{height:34px;padding:0 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.78rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:background .15s;flex-shrink:0}
.contacts-add-btn:hover{background:var(--accent-hover)}
.contacts-add-btn:disabled{opacity:.4;cursor:default}

/* State views */
.p-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 16px;color:var(--text-dim);font-size:.78rem;gap:8px;text-align:center;line-height:1.5}
.p-spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:pspin .65s linear infinite}
@keyframes pspin{to{transform:rotate(360deg)}}

/* Error/toast override for popup */
.error-banner{top:46px;max-width:calc(100% - 28px);white-space:normal;text-align:center}
.copy-toast-global:not(.anchored){top:14px}

/* Setup overlay */
.setup-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:999;flex-direction:column;justify-content:center;padding:28px 22px;gap:14px}
.setup-overlay.visible{display:flex}
.setup-title{font-size:.92rem;font-weight:600;color:var(--text)}
.setup-sub{font-size:.76rem;color:var(--text-muted);line-height:1.5}
.setup-lbl{font-size:.6rem;font-family:var(--mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.setup-hint{font-size:.67rem;color:var(--text-dim);text-align:center}
</style>
</head>
<body>

<div class="p-top">
  <!-- Header -->
  <div class="p-header">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 821.57 649" xmlns="http://www.w3.org/2000/svg" style="width:22px;height:17px;flex-shrink:0">
        <path fill="#6c63ff" d="M803.59,0H161.62c-9.93,0-17.98,8.05-17.98,17.98v472.04c0,9.93,8.05,17.98,17.98,17.98h641.97c9.93,0,17.98-8.05,17.98-17.98V17.98c0-9.93-8.05-17.98-17.98-17.98ZM483.5,304.84L214.63,35.96h537.74l-268.87,268.87ZM377.51,249.71l-197.91,197.91V51.8l197.91,197.91ZM402.95,275.14l67.84,67.84c3.37,3.37,7.95,5.27,12.72,5.27s9.34-1.89,12.72-5.27l66.2-66.2,195.25,195.25H206.05l196.89-196.9ZM587.84,251.36l197.76-197.76v395.52l-197.76-197.76Z"/>
        <path fill="rgba(108,99,255,.55)" d="M610,580H91c-11.05,0-20-8.95-20-20V93c0-11.05,8.95-20,20-20s20,8.95,20,20v447h499c11.05,0,20,8.95,20,20s-8.95,20-20,20Z"/>
        <path fill="rgba(108,99,255,.3)" d="M398.97,649H20c-11.05,0-20-8.95-20-20v-341c0-11.05,8.95-20,20-20s20,8.95,20,20v321h358.97c11.05,0,20,8.95,20,20s-8.95,20-20,20Z"/>
      </svg>
      <span class="brand-name">Aliaser</span>
    </div>
    <span class="topbar-count" id="popup-alias-count"></span>
    <button class="p-dashboard" id="btn-dashboard">
      Dashboard
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
    </button>
  </div>

  <!-- Create -->
  <div class="p-create" id="p-create-section">
    <div class="p-pills-label">Account</div>
    <div class="p-pills" id="p-pills"></div>

    <div id="p-name-wrap">
      <div class="p-field-label">Alias name</div>
      <div class="p-name-row">
        <input id="p-name" class="p-input" type="text" placeholder="e.g. shopping" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
        <button class="p-rand-btn" id="p-rand-btn" title="Random name">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- SL suffix selector (visible only for SL accounts) -->
    <div class="p-suffix-wrap" id="p-suffix-wrap">
      <div class="p-suffix-label">Suffix</div>
      <div class="p-suffix-chips" id="p-suffix-chips"></div>
    </div>

    <div class="p-preview" id="p-preview"></div>

    <button class="p-create-btn" id="p-create-btn" disabled>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Create &amp; copy alias
    </button>
  </div>

  <!-- Search -->
  <div class="p-search-wrap">
    <svg class="p-search-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="p-search" class="p-search" type="text" placeholder="Find aliases…" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
  </div>
</div>

<!-- Scrollable alias list -->
<div class="p-list" id="p-list">
  <div class="p-state"><div class="p-spinner"></div></div>
</div>

<!-- Contacts panel -->
<div class="contacts-panel" id="contacts-panel">
  <div class="contacts-header">
    <div class="contacts-title">
      <span class="contacts-label" id="contacts-alias-label"></span>
    </div>
    <button class="contacts-close" id="contacts-close">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="contacts-list" id="contacts-list">
    <div class="contacts-state"><div class="p-spinner"></div></div>
  </div>
  <div class="contacts-footer">
    <input id="contacts-new-email" class="p-input" type="email" placeholder="sender@example.com" autocomplete="off" autocapitalize="none" spellcheck="false">
    <button class="contacts-add-btn" id="contacts-add-btn">Add</button>
  </div>
</div>

<!-- Error banner -->
<div class="error-banner" id="error-banner">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
    <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
  </svg>
  <span id="error-text"></span>
</div>

<!-- Copy toast -->
<div class="copy-toast-global" id="copy-toast-global">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="copy-toast-text">Copied</span>
</div>

<!-- Setup overlay -->
<div class="setup-overlay" id="setup-overlay">
  <div class="setup-title">Welcome to Aliaser</div>
  <div class="setup-sub">Enter the URL of your Aliaser server to get started.</div>
  <div>
    <div class="setup-lbl">Server URL</div>
    <input id="setup-url" class="p-input" type="text" placeholder="http://192.168.1.10:8080" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
  </div>
  <button class="p-create-btn" id="setup-save">Connect</button>
  <div class="setup-hint">Local only? Default: <code style="font-family:var(--mono)">http://localhost:8080</code></div>
</div>

<script src="config.js"></script>
<script src="popup.js"></script>
</body>
</html>
