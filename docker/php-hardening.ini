; Production hardening for PHP.
; Never render errors to clients (info disclosure); log them instead.
display_errors = Off
display_startup_errors = Off
log_errors = On
; Don't advertise PHP via the X-Powered-By response header (recon reduction).
expose_php = Off
; Cap request body as defense-in-depth (the app also enforces a 1 MiB cap).
post_max_size = 2M
