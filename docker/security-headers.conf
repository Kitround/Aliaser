# Security headers applied to ALL responses (HTML, CSS, JS, JSON).
# proxy.php also sets these for its JSON responses, but static files
# (index.html, app.js, style.css) are served directly by Apache and would
# otherwise get none — leaving the actual page with no CSP / clickjacking
# protection. mod_headers covers every response in one place.
<IfModule mod_headers.c>
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "same-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
    # style-src needs 'unsafe-inline' for the inline style="" attributes in
    # index.html; img-src needs data: for the inline SVG dropdown arrow in CSS.
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    # HSTS is left to proxy.php (set conditionally when the request is HTTPS);
    # the app runs over HTTP on a private VPN, where HSTS is ignored anyway.
</IfModule>
